services:
  reservation-db:
    container_name: reservation-db
    image: postgres:16
    environment:
      POSTGRES_DB: reservation-db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d reservation-db"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - reservation-db:/var/lib/postgres/data
    ports:
      - "5433:5432"

volumes:
  reservation-db: